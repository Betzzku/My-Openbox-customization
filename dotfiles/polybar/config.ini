
[colors]
background = #1a1e1a
foreground = #c8d6c8
primary = #a6e3a1
alert = #f38ba8

[bar/main]
width = 100%
height = 28
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
padding = 2
module-margin = 1
font-0 = "Noto Sans Mono:size=11;2"
bottom = true
modules-left = xworkspaces
modules-center = date
modules-right = tray wlan memory cpu pulseaudio battery

[module/xworkspaces]
type = internal/xworkspaces
label-active = %index%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = %index%
label-occupied-padding = 2
label-empty = %index%
label-empty-padding = 2
[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0
label-connected = %{F#6bcf7f} online
label-disconnected = %{5c6a5c} offline

[module/pulseaudio]
type = internal/pulseaudio
label-volume = audio %percentage%%
label-muted = muted

scroll-up = pamixer --increase 5 && ~/.config/polybar/scripts/audio-menu.sh
scroll-down = pamixer --decrease 5 && ~/.config/polybar/scripts/audio-menu.sh
click-left = pamixer --toggle-mute && ~/.config/polybar/scripts/audio-menu.sh
click-right = pavucontrol
[module/memory]
type = internal/memory
label = ram %percentage_used%%

[module/cpu]
type = internal/cpu
label = cpu %percentage%%

[module/tray]
type = internal/tray
tray-spacing = 2

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
label-charging = %{F#a6e3a1} %percentage%%%{F-}
label-discharging = %percentage%%

[settings]
screenchange-reload = true
